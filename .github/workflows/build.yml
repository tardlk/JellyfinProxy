name: "🏗️ Build Plugin"

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.x'
      - name: Restore
        run: dotnet restore JellyfinPlugins.sln
      - name: Build JellyfinProxy
        run: dotnet build JellyfinProxy/JellyfinProxy.csproj -c Release --no-restore
      - name: Build TmdbTuner
        run: dotnet build TmdbTuner/TmdbTuner.csproj -c Release --no-restore
