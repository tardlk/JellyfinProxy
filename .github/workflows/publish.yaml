name: "🚀 Publish Plugin"

on:
  push:
    tags: ["*"]

env:
  dotnet-version: 9.0.x
  python-version: '3.11'
  project: JellyfinProxy.csproj
  artifact: JellyfinProxy

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Get tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.dotnet-version }}
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python-version }}
      - name: Initialize variables
        id: vars
        run: |
          VERSION=$(echo "${GITHUB_REF#refs/*/}" | sed s/^v//)
          VERSION="$VERSION.0"
          CHANGE_LOG=$(git tag -l '--format=%(contents)' ${{ github.ref_name }})
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "CHANGE_LOG=${CHANGE_LOG}" >> $GITHUB_OUTPUT
      - name: Build
        run: |
          dotnet restore ${{ env.project }} --no-cache
          dotnet build --nologo --no-restore --configuration=Release -p:Version=${{steps.vars.outputs.VERSION}} ${{ env.project }}
          mkdir -p artifacts
          zip -j ./artifacts/${{ env.artifact }}_${{steps.vars.outputs.VERSION}}.zip ./bin/Release/net9.0/JellyfinProxy.dll
      - name: Generate manifest
        run: python3 ./scripts/generate_manifest.py ./artifacts/${{ env.artifact }}_${{steps.vars.outputs.VERSION}}.zip ${GITHUB_REF#refs/*/}
      - name: Publish release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./artifacts/${{ env.artifact }}_*.zip
          tag: ${{ github.ref }}
          release_name: '${{ github.ref_name }}'
          file_glob: true
          overwrite: true
          body: |
            ${{steps.vars.outputs.CHANGE_LOG}}
            ![download](https://img.shields.io/github/downloads/${{ github.repository }}/${{ github.ref_name }}/total?label=Downloads)
      - name: Commit manifest to repo
        run: |
          git fetch origin master:master
          git checkout master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update manifest.json for ${{ github.ref_name }}" || echo "No changes to commit"
          git push
