name: "🚀 Publish Plugin"

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.x'
      - name: Build
        run: |
          dotnet restore JellyfinProxy/JellyfinProxy.csproj --no-cache
          dotnet build JellyfinProxy/JellyfinProxy.csproj -c Release --no-restore
          zip -j JellyfinProxy.zip ./JellyfinProxy/bin/Release/net6.0/JellyfinProxy.dll
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: JellyfinProxy.zip
          tag_name: latest
          name: JellyfinProxy
          make_latest: true
      - name: Update manifest checksum
        run: |
          CHKSUM=$(md5sum JellyfinProxy.zip | cut -d' ' -f1)
          echo "Checksum: $CHKSUM"
          sed -i "s/\"checksum\": \"[^\"]*\"/\"checksum\": \"$CHKSUM\"/" manifest.json
      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update checksum [skip ci]" || echo "No changes"
          git push origin HEAD:master
